name: Update submodules

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update direct submodules to latest remote commits
        run: |
          git submodule sync --recursive
          git submodule update --init --remote

      - name: Abort if any direct submodule is dirty internally
        run: |
          if ! git submodule foreach '
            git diff --quiet &&
            git diff --cached --quiet &&
            test -z "$(git ls-files --others --exclude-standard)"
          '; then
            echo "A direct submodule has local modified or untracked files after update."
            git submodule foreach 'echo "== $name =="; git status --short'
            exit 1
          fi

      - name: Check for recorded submodule SHA changes
        id: changes
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show updated submodule status
        if: steps.changes.outputs.changed == 'true'
        run: |
          git diff --submodule=log
          git submodule status

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(submodules): update submodules"
          title: "chore(submodules): update submodules"
          body: |
            Automated submodule update.

            This PR updates the repository submodules to their latest upstream
            remote commits.
          branch: ci/update-submodules
          delete-branch: true
          labels: |
            dependencies
            submodules
