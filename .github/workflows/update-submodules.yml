name: Update submodules

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:15 UTC
    - cron: "15 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest remote commits
        run: |
          git submodule sync --recursive
          git submodule update --init --remote --recursive

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet --submodule=diff --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show updated submodule status
        if: steps.changes.outputs.changed == 'true'
        run: git submodule status --recursive

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(submodules): update submodules"
          title: "chore(submodules): update submodules"
          body: |
            Automated submodule update.

            This PR updates the repository submodules to their latest upstream
            remote commits as resolved by `git submodule update --remote --recursive`.
          branch: ci/update-submodules
          delete-branch: true
          labels: |
            dependencies
            submodules
